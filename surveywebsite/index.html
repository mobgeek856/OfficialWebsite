<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1628" />
    <title>问卷调查 | Pumpkin Technology</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero" aria-label="品牌与宣传">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__inner">
        <div class="hero__logo">
          <img class="hero__logo-img" src="assets/logo.png" alt="Pumpkin Technology" decoding="async" />
        </div>
        <h1 class="hero__title">Pumpkin Technology</h1>
        <p class="hero__tagline">
          Connecting global traffic, monetization, and growth opportunities
        </p>
        <p class="hero__intro">
          欢迎填写以下问卷信息，方便我们进一步沟通合作需求
        </p>
        <figure class="company-qr hero__qr">

          <img
            class="company-qr__img"
            src="assets/company_QR.jpg"
            alt="Pumpkin Technology 官方二维码，扫码关注"
            width="155"
            height="155"
            decoding="async"
          />
          <figcaption class="company-qr__caption">扫码关注我们</figcaption>
        </figure>
      </div>
    </header>

    <main class="main">
      <section class="form-section" aria-labelledby="form-heading">
        <div class="form-section__head">
          <h2 id="form-heading" class="form-section__title">问卷调查</h2>
          <p class="form-section__subtitle">请填写以下信息，方便我们后续联系与合作</p>
        </div>

        <form id="survey-form" class="survey-form" novalidate>
          <div id="form-alert" class="form-alert" role="alert" hidden></div>

          <div class="field">
            <label class="field__label" for="companyName">公司名称 <span class="req">*</span></label>
            <input
              class="field__input"
              type="text"
              id="companyName"
              name="companyName"
              autocomplete="organization"
              maxlength="64"
              required
            />
            <span class="field__error" id="err-companyName" role="status"></span>
          </div>

          <div class="field">
            <label class="field__label" for="name">姓名 <span class="req">*</span></label>
            <input class="field__input" type="text" id="name" name="name" autocomplete="name" maxlength="20" required />
            <span class="field__error" id="err-name" role="status"></span>
          </div>

          <div class="field">
            <label class="field__label" for="title">职位 <span class="req">*</span></label>
            <input
              class="field__input"
              type="text"
              id="title"
              name="title"
              autocomplete="organization-title"
              maxlength="64"
              required
            />
            <span class="field__error" id="err-title" role="status"></span>
          </div>

          <div class="field">
            <label class="field__label" for="email">邮箱 <span class="req">*</span></label>
            <input class="field__input" type="email" id="email" name="email" autocomplete="email" maxlength="64" required />
            <span class="field__error" id="err-email" role="status"></span>
          </div>

          <div class="field">
            <span class="field__label" id="phone-field-label">手机号码 <span class="req">*</span></span>
            <div class="phone-row" role="group" aria-labelledby="phone-field-label">
              <select
                class="field__input phone-row__code"
                id="phoneCountry"
                name="phoneCountry"
                aria-label="国家或地区"
              >
                <option value="+86" selected>🇨🇳 +86</option>
                <option value="+852">🇭🇰 +852</option>
                <option value="+853">🇲🇴 +853</option>
                <option value="+886">🇹🇼 +886</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
                <option value="+81">🇯🇵 +81</option>
                <option value="+82">🇰🇷 +82</option>
                <option value="+65">🇸🇬 +65</option>
                <option value="+60">🇲🇾 +60</option>
                <option value="+66">🇹🇭 +66</option>
                <option value="+84">🇻🇳 +84</option>
                <option value="+63">🇵🇭 +63</option>
                <option value="+62">🇮🇩 +62</option>
                <option value="+91">🇮🇳 +91</option>
                <option value="+61">🇦🇺 +61</option>
                <option value="+64">🇳🇿 +64</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+49">🇩🇪 +49</option>
                <option value="+33">🇫🇷 +33</option>
                <option value="+39">🇮🇹 +39</option>
                <option value="+34">🇪🇸 +34</option>
                <option value="+31">🇳🇱 +31</option>
                <option value="+41">🇨🇭 +41</option>
                <option value="+46">🇸🇪 +46</option>
                <option value="+47">🇳🇴 +47</option>
                <option value="+45">🇩🇰 +45</option>
                <option value="+358">🇫🇮 +358</option>
                <option value="+353">🇮🇪 +353</option>
                <option value="+32">🇧🇪 +32</option>
                <option value="+43">🇦🇹 +43</option>
                <option value="+48">🇵🇱 +48</option>
                <option value="+7">🇷🇺 +7</option>
                <option value="+27">🇿🇦 +27</option>
                <option value="+55">🇧🇷 +55</option>
                <option value="+52">🇲🇽 +52</option>
                <option value="+54">🇦🇷 +54</option>
                <option value="+351">🇵🇹 +351</option>
                <option value="+420">🇨🇿 +420</option>
                <option value="+36">🇭🇺 +36</option>
                <option value="+30">🇬🇷 +30</option>
                <option value="+90">🇹🇷 +90</option>
                <option value="+972">🇮🇱 +972</option>
                <option value="+20">🇪🇬 +20</option>
                <option value="+234">🇳🇬 +234</option>
                <option value="+254">🇰🇪 +254</option>
                <option value="+880">🇧🇩 +880</option>
                <option value="+92">🇵🇰 +92</option>
              </select>
              <input
                class="field__input phone-row__number"
                type="tel"
                id="phone"
                name="phone"
                autocomplete="tel-national"
                inputmode="tel"
                placeholder="不含国家码"
                required
              />
            </div>
            <span class="field__error" id="err-phone" role="status"></span>
          </div>

          <div class="field">
            <label class="field__label" for="teams">Teams</label>
            <input class="field__input" type="text" id="teams" name="teams" autocomplete="off" maxlength="64" />
            <span class="field__error" id="err-teams" role="status"></span>
          </div>

          <fieldset class="field field--radios">
            <legend class="field__label">行业 <span class="req">*</span></legend>
            <div class="radio-list">
              <label class="radio">
                <input type="radio" name="industry" value="服务商" />
                <span>服务商</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="游戏" />
                <span>游戏</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="泛娱乐-网文、短剧、视频社交" />
                <span>泛娱乐-网文、短剧、视频社交</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="应用工具" />
                <span>应用工具</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="AI人工智能" />
                <span>AI人工智能</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="软件开发" />
                <span>软件开发</span>
              </label>
              <label class="radio">
                <input type="radio" name="industry" value="其它" id="industry-other-radio" />
                <span>其它</span>
              </label>
            </div>
            <span class="field__error" id="err-industry" role="status"></span>
          </fieldset>

          <div class="field field--other" id="industry-other-wrap" hidden>
            <label class="field__label" for="industryOther">其它行业说明 <span class="req">*</span></label>
            <input
              class="field__input"
              type="text"
              id="industryOther"
              name="industryOther"
              autocomplete="off"
              maxlength="256"
            />
            <span class="field__error" id="err-industryOther" role="status"></span>
          </div>

          <button type="submit" class="btn-submit" id="submit-btn">提交</button>
        </form>

        <div id="success-panel" class="success-panel" hidden>
          <p class="success-panel__text">提交成功，感谢您的填写</p>
          <figure class="company-qr success-panel__qr">
            <figcaption class="company-qr__caption">扫码关注我们，获取更多合作资讯</figcaption>
            <img
              class="company-qr__img"
              src="assets/company_QR.jpg"
              alt="Pumpkin Technology 官方二维码，扫码关注或保存联系方式"
              width="200"
              height="200"
              decoding="async"
            />
          </figure>
        </div>

        <div
          id="form-submitting"
          class="form-submitting"
          hidden
          aria-hidden="true"
          aria-live="polite"
        >
          <div class="form-submitting__panel">
            <span class="form-submitting__spinner" aria-hidden="true"></span>
            <p class="form-submitting__text">正在提交，请稍候…</p>
          </div>
        </div>
      </section>
    </main>

    <dialog class="result-dialog" id="result-dialog" aria-labelledby="result-dialog-title">
      <div class="result-dialog__inner">
        <div class="result-dialog__icon-success" aria-hidden="true">
          <div class="result-dialog__check-ring">
            <svg class="result-dialog__check-svg" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle class="result-dialog__check-circle" cx="28" cy="28" r="24" stroke="currentColor" stroke-width="2.5" />
              <path
                class="result-dialog__check-mark"
                d="M17 28.5l7.2 7.2L39 20.5"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
        <h3 id="result-dialog-title" class="result-dialog__title"></h3>
        <p class="result-dialog__msg" id="result-dialog-msg"></p>
        <p class="result-dialog__meta" id="result-dialog-meta" hidden></p>
        <figure class="company-qr result-dialog__qr">
          <figcaption class="company-qr__caption">欢迎扫码关注我们</figcaption>
          <img
            class="company-qr__img"
            src="assets/company_QR.jpg"
            alt="Pumpkin Technology 官方二维码"
            width="168"
            height="168"
            decoding="async"
          />
        </figure>
        <button type="button" class="result-dialog__btn" id="result-dialog-close">确定</button>
      </div>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
